services:
  - type: web
    name: voice-qa
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: gpt-oss:20b-cloud
      - key: WHISPER_MODEL
        value: tiny.en
      - key: WHISPER_COMPUTE
        value: int8
      - key: WAKEWORD_MODELS
        value: hey_jarvis
